<!DOCTYPE html>
<html>

<head>
<title>Cyber Safety Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
    padding:30px;
}

/* LOGIN */
#loginBox{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-card{
    background:#111827;
    padding:30px;
    border-radius:10px;
    text-align:center;
}

input{
    padding:10px;
    margin:10px;
    border-radius:6px;
    border:none;
}

/* DASHBOARD */
#dashboard{ display:none; }

button{
    padding:10px 18px;
    background:linear-gradient(45deg,#22c55e,#16a34a);
    border:none;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin:5px;
}

.tabs{ margin:20px 0; }

/* STATS */
.stats{
    display:flex;
    gap:20px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:12px;
    flex:1;
    text-align:center;
}

/* CHARTS */
.chart-container{
    display:flex;
    gap:30px;
    justify-content:center;
    margin-top:30px;
}

.chart-box{ width:350px; }

/* TABLE */
.table-container{
    max-height:400px;
    overflow-y:auto;
    margin-top:30px;
}

table{
    width:100%;
    border-collapse:collapse;
}

/* 🔥 STICKY HEADER */
thead th{
    position: sticky;
    top: 0;
    background:#1e293b;
    z-index: 2;
}

th,td{ padding:10px; }

tr.blocked{ background:rgba(255,0,0,0.2); }

/* STATUS */
.status-safe{ color:#22c55e; font-weight:bold; }
.status-blocked{ color:#ef4444; font-weight:bold; }

/* TOXICITY BAR */
.progress{
    width:120px;
    height:10px;
    background:#1e293b;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
}

/* MEDIA */
img{
    border-radius:6px;
}

video{
    border-radius:6px;
}

/* EXPORT */
.export{
    display:flex;
    justify-content:flex-end;
    margin-top:15px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
    <div class="login-card">
        <h2>Admin Login</h2>
        <input type="password" id="password">
        <br>
        <button onclick="login()">Login</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<h1>🚀 Cyber Safety Dashboard</h1>

<div class="tabs">
<button onclick="filterLogs('all')">All</button>
<button onclick="filterLogs('text')">Text</button>
<button onclick="filterLogs('image')">Image</button>
<button onclick="filterLogs('video')">Video</button>
</div>

<div class="stats">
<div class="card"><h2 id="total">0</h2><p>Total</p></div>
<div class="card"><h2 id="blockedCount">0</h2><p>Blocked</p></div>
</div>

<!-- CHARTS -->
<div class="chart-container">
<div class="chart-box"><canvas id="barChart"></canvas></div>
<div class="chart-box"><canvas id="pieChart"></canvas></div>
</div>

<!-- TABLE -->
<div class="table-container">
<table>
<thead>
<tr>
<th>Type</th>
<th>Content</th>
<th>Status</th>
<th>Toxicity</th>
<th>Timestamp</th>
<th>Reason</th>
</tr>
</thead>
<tbody id="logs"></tbody>
</table>
</div>

<!-- EXPORT -->
<div class="export">
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<script>

let allLogs=[];
let currentFilter="all";
let barChart,pieChart;

/* LOGIN */
function login(){
    if(password.value==="admin123"){
        loginBox.style.display="none";
        dashboard.style.display="block";
        loadLogs();
        setInterval(loadLogs,3000);
    }else alert("Wrong password");
}

/* LOAD */
async function loadLogs(){
    const res=await fetch("/logs");
    allLogs=await res.json();
    filterLogs(currentFilter);
}

/* FILTER */
function filterLogs(type){
    currentFilter=type;
    let logs = type==="all"?allLogs:allLogs.filter(l=>l.type===type);
    displayLogs(logs);
    updateCharts(logs,type);
}

/* TIME */
function formatTime(ts){
    if(!ts) return "N/A";
    return new Date(ts).toLocaleString();
}

/* DISPLAY */
function displayLogs(logs){

    const table=document.getElementById("logs");
    table.innerHTML="";

    let blocked=0;

    logs.forEach(log=>{

        if(log.status==="blocked") blocked++;

        let statusClass = log.status==="blocked" ? "status-blocked" : "status-safe";

        let percent;
        let color;

        if(log.status === "safe" || log.status === "allowed"){
            percent = 0;
            color = "#22c55e";
        }
        else if(log.status === "blocked"){
            percent = Math.round(log.confidence * 100);
            color = "#ef4444";
        }

        // 🔥 MEDIA DISPLAY
        let contentHTML = "";

        if(log.type === "image" && log.path){
            contentHTML = `<img src="${log.path}" width="80">`;
        }
        else if(log.type === "video" && log.path){
            contentHTML = `
                <video width="120" controls>
                    <source src="${log.path}">
                </video>
            `;
        }
        else{
            contentHTML = log.content;
        }

        table.innerHTML+=`
        <tr class="${log.status==='blocked'?'blocked':''}">
        <td>${log.type}</td>
        <td>${contentHTML}</td>
        <td class="${statusClass}">${log.status}</td>

        <td>
            <div class="progress">
                <div class="progress-bar" 
                style="width:${percent}%; background:${color}"></div>
            </div>
            <small>${percent}% risk</small>
        </td>

        <td>${formatTime(log.timestamp)}</td>
        <td>${log.reason}</td>
        </tr>
        `;
    });

    total.innerText=logs.length;
    blockedCount.innerText=blocked;
}

/* CHARTS */
function updateCharts(logs,type){

    let labels=[],data=[];

    if(type==="all"){
        let text=0,img=0,vid=0,blocked=0;

        logs.forEach(l=>{
            if(l.type==="text") text++;
            if(l.type==="image") img++;
            if(l.type==="video") vid++;
            if(l.status==="blocked") blocked++;
        });

        labels=["Text","Image","Video","Blocked"];
        data=[text,img,vid,blocked];
    }
    else{
        let safe=0,unsafe=0;
        logs.forEach(l=>{
            l.status==="blocked"?unsafe++:safe++;
        });

        labels=["Safe","Unsafe"];
        data=[safe,unsafe];
    }

    drawCharts(labels,data);
}

/* DRAW */
function drawCharts(labels,data){

    if(barChart) barChart.destroy();
    if(pieChart) pieChart.destroy();

    const colors=["#22c55e","#ef4444","#3b82f6","#f59e0b"];

    barChart=new Chart(barChartCanvas,{
        type:"bar",
        data:{labels,datasets:[{data,backgroundColor:colors}]}
    });

    pieChart=new Chart(pieChartCanvas,{
        type:"pie",
        data:{labels,datasets:[{data,backgroundColor:colors}]}
    });
}

const barChartCanvas=document.getElementById("barChart");
const pieChartCanvas=document.getElementById("pieChart");

/* EXPORT */
function downloadCSV(){
    window.location="/export-report";
}

function downloadPDF(){
    window.print();
}

</script>

</body>
</html>
