<!DOCTYPE html>
<html>

<head>

<title>Cyber Safety Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
}

button{
    padding:10px 20px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-bottom:20px;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:40px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    flex:1;
    text-align:center;
}

.card h2{
    font-size:30px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th,td{
    padding:10px;
    border-bottom:1px solid #334155;
}

th{
    background:#334155;
}

.chart-grid{
    display:flex;
    gap:30px;
    justify-content:center;
    margin-bottom:40px;
}

.chart-box{
    width:450px;
    height:320px;
    background:#1e293b;
    border-radius:10px;
    padding:20px;
}

canvas{
    width:100% !important;
    height:100% !important;
}

</style>

</head>


<body>

<h1>Cyber Safety Moderation Dashboard</h1>

<button onclick="downloadReport()">Download Moderation Report</button>


<div class="stats">

<div class="card">
<h2 id="total">0</h2>
<p>Total Logs</p>
</div>

<div class="card">
<h2 id="blocked">0</h2>
<p>Blocked Content</p>
</div>

<div class="card">
<h2 id="images">0</h2>
<p>Image Uploads</p>
</div>

<div class="card">
<h2 id="videos">0</h2>
<p>Video Uploads</p>
</div>

</div>



<div class="chart-grid">

<div class="chart-box">
<h3 style="text-align:center">Moderation Analytics</h3>
<canvas id="moderationChart"></canvas>
</div>


<div class="chart-box">
<h3 style="text-align:center">Content Distribution</h3>
<canvas id="categoryChart"></canvas>
</div>

</div>



<h2>Moderation Logs</h2>

<table id="logs">

<thead>
<tr>
<th>Type</th>
<th>Content</th>
<th>Category</th>
<th>Status</th>
<th>Confidence</th>
<th>Reason</th>
</tr>
</thead>

<tbody></tbody>

</table>



<script>

let barChart;
let pieChart;

async function loadLogs(){

    const res = await fetch("/logs");
    const logs = await res.json();

    const table = document.querySelector("#logs tbody");
    table.innerHTML = "";

    let total = logs.length;
    let blocked = 0;
    let images = 0;
    let videos = 0;

    let toxic = 0;
    let neutral = 0;

    logs.forEach(log => {

        if(log.status === "blocked"){
            blocked++;
        }

        if(log.type === "image"){
            images++;
        }

        if(log.type === "video"){
            videos++;
        }

        if(log.category === "Bullying"){
            toxic++;
        }

        if(log.category === "Neutral"){
            neutral++;
        }

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${log.type}</td>
        <td>${log.content}</td>
        <td>${log.category}</td>
        <td>${log.status}</td>
        <td>${Number(log.confidence).toFixed(3)}</td>
        <td>${log.reason || "-"}</td>
        `;

        table.appendChild(row);

    });

    document.getElementById("total").innerText = total;
    document.getElementById("blocked").innerText = blocked;
    document.getElementById("images").innerText = images;
    document.getElementById("videos").innerText = videos;

    createChart(toxic, neutral, images, videos);
    createCategoryChart(toxic, neutral, images, videos);

}



function createChart(toxic, neutral, images, videos){

    const ctx = document.getElementById("moderationChart");

    if(barChart){
        barChart.destroy();
    }

    barChart = new Chart(ctx,{

        type:"bar",

        data:{
            labels:["Bullying","Neutral","Image Uploads","Video Uploads"],

            datasets:[{
                label:"Moderation Statistics",
                data:[toxic, neutral, images, videos],

                backgroundColor:[
                    "#ef4444",
                    "#22c55e",
                    "#f59e0b",
                    "#3b82f6"
                ]
            }]
        },

        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{
                    labels:{color:"white"}
                }
            },
            scales:{
                x:{ticks:{color:"white"}},
                y:{ticks:{color:"white"}}
            }
        }

    });

}



function createCategoryChart(toxic, neutral, images, videos){

    const ctx = document.getElementById("categoryChart");

    if(pieChart){
        pieChart.destroy();
    }

    pieChart = new Chart(ctx,{

        type:"pie",

        data:{
            labels:["Bullying","Neutral","Images","Videos"],

            datasets:[{
                data:[toxic, neutral, images, videos],

                backgroundColor:[
                    "#ef4444",
                    "#22c55e",
                    "#f59e0b",
                    "#3b82f6"
                ]
            }]
        },

        options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{
                legend:{
                    labels:{color:"white"}
                }
            }
        }

    });

}



function downloadReport(){

    window.location.href = "/export-report";

}



loadLogs();

/* Auto update dashboard every 3 seconds */
setInterval(loadLogs,3000);

</script>


</body>
</html>
